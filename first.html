<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body class="bg-[#55B2BF] ">
    
    <div class="pl-4">
        <p class="text-[47px]">Super cool unicode text magic.</p>
    </div>

    <div class=" flex gap-96 pl-4">
        <div>
            <p class="text-[17px]">your text</p>
        </div>
        <div>
            <input type="text" id="text" class="w-[1580px] md:flex-1 border border-gray-400 h-32 ml-20 bg-[#AAD9DF] focus:outline-none focus:ring-0  " placeholder="write something.....">
        </div>
        
    </div>
    <div class="">
        <div class="flex gap-[455px] h-10 items-center flex-col md:flex-row md:items-center md:h-10">

            <span class="underline text-[18px] pl-4 ">bold serif</span>
            <p id="bold"></p>
        </div>
        <div class="flex gap-[488px] bg-[#6DBDC9] h-10 items-center md:flex-row  md:items-center  md:h-10">
            <span class="underline text-[18px] pl-4 text-2xl" >italic</span>
            <p id="italic"></p>
        </div>
        <div class="flex gap-[450px] h-10 items-center  md:flex-row  md:items-center md:h-10" >
            <span class="underline text-[18px] pl-4">underline</span>
            <p id="underline"></p>
        </div>
        <div class="flex gap-[440px] h-10 items-center bg-[#6DBDC9] md:flex-row  md:items-center md:h-10" >
            <span class=" text-[18px] pl-4 ">bold (sans)</span>
            <p id="under"></p>
        </div>
        
        
        
        
    </div>
    <script>
        let text = document.querySelector("#text")
        let para = document.querySelector("#bold")
        let italic = document.querySelector("#italic")
        let underline = document.querySelector("#underline")
        let under= document.querySelector("#under")


        text.addEventListener("input",(e)=>{
            para.innerHTML =  "<b>" + e.target.value + "</b>"
            italic.innerHTML =  "<i>" + e.target.value + "</i>"
            underline.innerHTML =  "<u>" + e.target.value + "</u>"
            under.innerHTML =  "<b><i>" + e.target.value + "</b></i>"

        
            
        })
    </script>
</body>
</html>
